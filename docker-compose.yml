services:
  tram-display:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DISPLAY_MODE: web
      # Set DEBUG=1 to enable verbose per-trip logging
      # DEBUG: 1
      POLL_INTERVAL_MS: 30000
      DEPARTURES_PER_STOP: 10
      DEPARTURES_WINDOW_MINUTES: 90
      GTFS_REFRESH_INTERVAL_MS: 86400000

      # direction filters use headsign substring match — case/accent-insensitive
      # line filter uses routeShortName exact match (string)
      STOPS: |
        [
          { "stopId": "U1398Z2", "name": "Mostecká",    "direction": "" },
          { "stopId": "U1782Z2", "name": "Zdráhalova",  "direction": "" },
          { "stopId": "U1782Z1", "name": "Zdráhalova",  "direction": "", "lines": ["5"], "logo": "Albert_logo.svg.png" },
          { "stopId": "U1667Z2", "name": "Tomanova",    "direction": "" },
          { "stopId": "U1667Z1", "name": "Tomanova",    "direction": "", "lines": ["9"], "logo": "Lidl-Logo.svg.png" },
          { "stopId": "U1211Z8", "name": "Jugoslávská", "direction": "", "lines": ["3"] }
        ]