name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Syntax check
        # --check parses without executing; catches syntax errors across all JS files
        run: node --check src/**/*.js index.js

      - name: Smoke test ESM imports
        run: node -e "import('./src/config/constants.js')"

