name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 15
    # allowlist: only trigger a real deploy for known team members
    # prevents fork PRs or unknown actors from running code on the home server
    if: |
      github.actor == 'martinszuc' ||
      github.actor == 'ROOMMATE_1_USERNAME' ||
      github.actor == 'ROOMMATE_2_USERNAME'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rebuild and redeploy
        working-directory: ${{ github.workspace }}
        run: ./scripts/deploy.sh

      - name: Verify container is running
        run: |
          docker ps --filter name=tram-display
          echo "--- last 20 log lines ---"
          docker logs brno-tram-display-tram-display-1 --tail 20

      - name: Show logs on failure
        if: failure()
        run: docker logs brno-tram-display-tram-display-1 --tail 50 || true

